name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  format-check:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find src tests -type f \( -name '*.cpp' -o -name '*.h' -o -name '*.hpp' \) \
            | xargs clang-format --dry-run --Werror

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies & Build GTest
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang libgtest-dev
          sudo sh -c 'cd /usr/src/gtest && cmake . && make && cp lib/*.a /usr/lib/'

      - name: Build & install SDL3 from source
        run: |
          git clone --depth 1 --branch release-3.2.10 https://github.com/libsdl-org/SDL.git
          cmake -S SDL -B SDL/build -DCMAKE_BUILD_TYPE=Release -DSDL_TESTS=OFF
          cmake --build SDL/build
          sudo cmake --install SDL/build

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure
